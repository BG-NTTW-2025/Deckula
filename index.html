

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Deckula Prototype</title>
<style>
body{margin:0;background:#222;font-family:Arial}
#table{position:relative;width:1240px;height:640px;margin:auto;background:#333;overflow:hidden}
.area,.button{position:absolute}
.card{position:absolute;width:88px;height:123px;cursor:pointer}
#preview{position:absolute;left:17px;top:61px;width:352px;height:492px;border:1px solid #666}
.text{position:absolute;color:white;font-weight:bold}
</style>

<body>
<div id="table">
<img id="preview" src="C00.gif">

<img class="area" src="Area_Home.gif" style="left:409px;top:360px">
<img class="area" src="Area_Discard.gif" style="left:409px;top:179px">
<img class="area" src="Area_Threat.gif" style="left:620px;top:179px">
<img class="area" src="Area_Deck.gif" style="left:400px;top:10px">
<img class="area" src="Area_Visitors.gif" style="left:1079px;top:10px">
<img class="area" src="Area_Killed.gif" style="left:1079px;top:179px">

<div class="text" style="left:513px;top:6px" id="deckCnt">Deck: 0</div>
<div class="text" style="left:537px;top:175px" id="disCnt">Dis: 0</div>
<div class="text" style="left:620px;top:348px" id="clock">00:00</div>
</div>
<script>
let topZ=1000,activeCard=null,dragOffsetX=0,dragOffsetY=0;
const table=document.getElementById('table');
const preview=document.getElementById('preview');
function createCard(cardName){const c=document.createElement('img');
c.className='card';
c.dataset.real=cardName;
c.dataset.faceup='0';
c.src='C00.gif';
c.style.left='416px';
c.style.top='38px';

c.addEventListener('mouseenter',()=>{preview.src=c.src;});
c.addEventListener('dblclick',(e)=>{e.preventDefault();if(c.dataset.faceup==='0'){c.dataset.faceup='1';
c.src=c.dataset.real;}else{c.dataset.faceup='0';
c.src='C00.gif';}preview.src=c.src;});
c.addEventListener('mousedown',(e)=>{if(e.button!==0)return;activeCard=c;
dragOffsetX=e.offsetX;
dragOffsetY=e.offsetY;
c.style.zIndex=++topZ;
e.preventDefault();});
table.appendChild(c);}document.addEventListener('mousemove',(e)=>{if(activeCard===null)return;const r=table.getBoundingClientRect();
activeCard.style.left=(e.clientX-r.left-dragOffsetX)+'px';
activeCard.style.top=(e.clientY-r.top-dragOffsetY)+'px';});
document.addEventListener('mouseup',()=>{activeCard=null;});
for(let i=1;i<=50;i++){let n=String(i).padStart(2,'0');createCard('C'+n+'.gif');}let seconds=0;setInterval(()=>{seconds++;
let m=Math.floor(seconds/60);
let s=seconds%60;
document.getElementById('clock').innerHTML=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');},1000);
</script>
</body>
</html>
